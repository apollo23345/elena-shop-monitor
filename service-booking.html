<!DOCTYPE html>
<html>
<head>
    <title>Elena's Shop - Service Booking</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 2. PAGE-SPECIFIC STYLES ONLY */
        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        /* This ensures only buttons INSIDE cards are 100% wide */
        .card select, .card button { 
            width: 100%; 
            padding: 10px; 
            margin-top: 10px; 
            border-radius: 4px; 
            border: 1px solid #ddd;
        }

        .summary-list { list-style: none; padding: 0; }
        .summary-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 5px 0; 
            border-bottom: 1px solid #eee; 
        }
        
        .btn-book { 
            background: var(--primary) !important; 
            color: white !important; 
            border: none !important; 
            font-weight: bold; 
            cursor: pointer; 
            height: 50px; 
            font-size: 1.1em; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="/images/eldorado.jpg" alt="Logo"> ELENA'S AUTO SHOP
        </div>
        <div class="user-area">
            <span id="display-user-name">Employee Name</span>
            <button onclick="logout()" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px; margin-left: 10px;">Logout</button>
        </div>
    </header>

    <nav id="navbar">
        <button onclick="location.href='dashboard.html'">Dashboard</button>
        <button onclick="location.href='new-customer.html'">New Customer</button>
        <button class="active" onclick="location.href='service-booking.html'">Service Booking</button>
        <button onclick="location.href='checkout.html'">Check Out</button>
        <button id="admin-nav" class="admin-only" onclick="location.href='admin.html'">Admin Control</button>
    </nav>

    <div class="container">
<div class="card">
    <h3 id="customer-info">Booking for: </h3>
    
    <label>Type/Select Service</label>
    <input list="service-options" id="service-select-input" placeholder="Start typing a service...">
    <datalist id="service-options"></datalist>
    <button onclick="addItem('Service')">Add Service</button>
    
    <hr>
    
    <label>Type/Select Parts/Inventory</label>
    <input list="part-options" id="part-select-input" placeholder="Start typing a part...">
    <datalist id="part-options"></datalist>
    <button onclick="addItem('Part')">Add Part</button>
</div>

        <div class="card">
            <h3>Job Summary</h3>
            <ul id="booking-list" class="summary-list"></ul>
            <div style="text-align:right; font-weight:bold; margin-top:15px;">Total: ₱<span id="total-price">0</span></div>
            <button class="btn-book" onclick="finalizeBooking()">Book Services & Assign Bay</button>
        </div>
    </div>

</body>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabaseUrl = 'https://yrqtnaxnshkkizradtsd.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycXRuYXhuc2hra2l6cmFkdHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODY5NTMsImV4cCI6MjA5MTM2Mjk1M30.dBveYrCJ24XIkyx6rc-iVaYkdOBGgsa-wuCV2shr1cY'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Identity & Access
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('display-user-name').innerText = user.first_name + " " + user.last_name;
        if (user.manager_id === null) {
            document.getElementById('admin-nav').style.display = 'block';
        }
    }

    window.logout = () => {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    };

    const urlParams = new URLSearchParams(window.location.search);
    const plate = urlParams.get('plate');
    const name = urlParams.get('name');
    let selectedItems = [];

    if (plate) {
        document.getElementById('customer-info').innerText = `Booking for: ${name} (${plate})`;
    }

let serviceData = []; // To store full details (id, name, price)
let inventoryData = [];

async function loadOptions() {
    const { data: srv } = await supabase.from('services').select('*');
    const { data: inv } = await supabase.from('inventory').select('*');
    
    if (srv) {
        serviceData = srv;
        document.getElementById('service-options').innerHTML = srv.map(s => 
            `<option value="${s.service_name}">`
        ).join('');
    }
    if (inv) {
        inventoryData = inv;
        document.getElementById('part-options').innerHTML = inv.map(i => 
            `<option value="${i.item_name}">`
        ).join('');
    }
}

window.addItem = (type) => {
    const inputId = type === 'Service' ? 'service-select-input' : 'part-select-input';
    const input = document.getElementById(inputId);
    const typedValue = input.value;

    // Find the item in our data arrays to get the price
    const sourceData = type === 'Service' ? serviceData : inventoryData;
    const nameField = type === 'Service' ? 'service_name' : 'item_name';
    
    const foundItem = sourceData.find(item => item[nameField] === typedValue);

    if (foundItem) {
        selectedItems.push({
            type: type,
            name: foundItem[nameField],
            price: parseFloat(foundItem.price)
        });
        updateSummary();
        input.value = ''; // Clear input for next item
    } else {
        alert("Please select a valid item from the list!");
    }
};

    function updateSummary() {
        const list = document.getElementById('booking-list');
        let total = 0;
        list.innerHTML = selectedItems.map(item => {
            total += item.price;
            return `<li class="summary-item"><span>${item.name}</span> <span>₱${item.price}</span></li>`;
        }).join('');
        document.getElementById('total-price').innerText = total;
    }

    window.finalizeBooking = async () => {
        if(selectedItems.length === 0) return alert("Select at least one service!");
        
        const insertData = selectedItems.map(item => ({
            plate_number: plate,
            item_type: item.type,
            item_name: item.name,
            price: item.price
        }));

        const { error } = await supabase.from('transaction_details').insert(insertData);
        if(!error) {
            window.location.href = `dashboard.html?plate=${plate}&name=${name}`;
        } else {
            alert("Error saving booking: " + error.message);
        }
    };

    loadOptions();
</script>
</html>
