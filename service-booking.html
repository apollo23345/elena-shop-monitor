<!DOCTYPE html>
<html>
<head>
    <title>Elena's Shop - Service Booking</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 2. PAGE-SPECIFIC STYLES ONLY */
        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        /* This ensures only buttons INSIDE cards are 100% wide */
/* Replace your .card select, .card button rule with this */
.card select, 
.card input, 
.card button { 
    width: 100%; 
    padding: 12px; /* Slightly more padding for better touch/click area */
    margin-top: 10px; 
    margin-bottom: 5px; /* Adds space before the button */
    border-radius: 6px; 
    border: 1px solid #ccc;
    box-sizing: border-box; /* Crucial: keeps the width at exactly 100% */
    font-size: 14px;
}

/* Make the labels look a bit sharper */
.card label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    font-size: 0.85em;
    color: #555;
    text-transform: uppercase;
}

/* Optional: Add a focus effect so you know which box you are typing in */
.card input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 5px rgba(62, 207, 142, 0.3);
}

        .summary-list { list-style: none; padding: 0; }
        .summary-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 5px 0; 
            border-bottom: 1px solid #eee; 
        }
        
        .btn-book { 
            background: var(--primary) !important; 
            color: white !important; 
            border: none !important; 
            font-weight: bold; 
            cursor: pointer; 
            height: 50px; 
            font-size: 1.1em; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="/images/eldorado.jpg" alt="Logo"> ELENA'S AUTO SHOP
        </div>
        <div class="user-area">
            <span id="display-user-name">Employee Name</span>
            <button onclick="logout()" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px; margin-left: 10px;">Logout</button>
        </div>
    </header>

    <nav id="navbar">
        <button onclick="location.href='dashboard.html'">Dashboard</button>
        <button onclick="location.href='new-customer.html'">New Customer</button>
        <button class="active" onclick="location.href='service-booking.html'">Service Booking</button>
        <button onclick="location.href='checkout.html'">Check Out</button>
        <button id="admin-nav" class="admin-only" onclick="location.href='admin.html'">Admin Control</button>
    </nav>

    <div class="container">
<div class="card">
    <h3 id="customer-info">Booking for: </h3>
    
    <label>Type/Select Service</label>
    <input list="service-options" id="service-select-input" placeholder="Start typing a service...">
    <datalist id="service-options"></datalist>
    <button onclick="addItem('Service')">Add Service</button>
    
    <hr>
    
<label>Type/Select Parts/Inventory</label>
<div style="display: flex; gap: 5px;">
    <input list="part-options" id="part-select-input" oninput="window.checkAlternatives(this.value)" placeholder="Search part..." style="flex: 3;">
    <input type="number" id="part-qty-input" value="1" min="1" style="flex: 1;" placeholder="Qty">
</div>
<datalist id="part-options"></datalist>

<button onclick="addItem('Part')">Add Part</button>
    <div id="alt-suggestion-box" style="font-size: 0.85em; color: #555; margin-top: 10px; font-style: italic; max-height: 120px; overflow-y: auto; border-left: 3px solid #2ecc71; padding-left: 10px;"></div>
</div>


        <div class="card">
            <h3>Job Summary</h3>
            <ul id="booking-list" class="summary-list"></ul>
            <div style="text-align:right; font-weight:bold; margin-top:15px;">Total: ₱<span id="total-price">0</span></div>
            <button class="btn-book" onclick="finalizeBooking()">Book Services & Assign Bay</button>
        </div>
    </div>

</body>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabaseUrl = 'https://yrqtnaxnshkkizradtsd.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycXRuYXhuc2hra2l6cmFkdHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODY5NTMsImV4cCI6MjA5MTM2Mjk1M30.dBveYrCJ24XIkyx6rc-iVaYkdOBGgsa-wuCV2shr1cY'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Identity & Access
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('display-user-name').innerText = user.first_name + " " + user.last_name;
        if (user.manager_id === null) {
            const adminNav = document.getElementById('admin-nav');
            if(adminNav) adminNav.style.display = 'block';
        }
    }

    window.logout = () => {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    };

    const urlParams = new URLSearchParams(window.location.search);
    const plate = urlParams.get('plate');
    const name = urlParams.get('name');
    
    if (plate) {
        document.getElementById('customer-info').innerText = `Booking for: ${name} (${plate})`;
    }

    let serviceData = []; 
    let inventoryData = [];
    let selectedItems = []; 

    async function loadOptions() {
        const { data: srv } = await supabase.from('services').select('*');
        const { data: inv } = await supabase.from('inventory').select('*');
        
        if (srv) serviceData = srv;
        if (inv) {
            // We create current_qty so we can track "temporary" stock changes before saving
            inventoryData = inv.map(item => ({ ...item, current_qty: item.stock_quantity }));
        }
        renderDatalists();
    }

function renderDatalists() {
    // Fill Service dropdown
    const srvList = document.getElementById('service-options');
    if (srvList) {
        srvList.innerHTML = serviceData.map(s => 
            `<option value="${s.service_name}">`
        ).join('');
    }
    
    // Fill Part dropdown
    const partList = document.getElementById('part-options');
    if (partList) {
        partList.innerHTML = inventoryData.map(i => 
            `<option value="${i.item_name} (Stock: ${i.current_qty})">`
        ).join('');
    }
}

window.addItem = (type) => {
    const inputId = type === 'Service' ? 'service-select-input' : 'part-select-input';
    const input = document.getElementById(inputId);
    let typedValue = input.value.split(/\s*\(/)[0].trim().toLowerCase(); 

    if (type === 'Service') {
        const found = serviceData.find(s => s.service_name.toLowerCase() === typedValue);
        if (!found) return alert("Service not found!");

        const isAlreadySelected = selectedItems.some(item => item.type === 'Service' && item.name.toLowerCase() === typedValue);
        if (isAlreadySelected) return alert("Service already added!");

        selectedItems.push({ type, name: found.service_name, price: found.price, id: found.id, qty: 1 });
    } else {
        const qtyInput = document.getElementById('part-qty-input');
        const qtyToAdd = parseInt(qtyInput.value);
        const found = inventoryData.find(i => i.item_name.trim().toLowerCase() === typedValue);
        
        if (!found) return alert("Part not found!");
        if (qtyToAdd < 1) return alert("Minimum quantity is 1");
        if (found.current_qty < qtyToAdd) return alert(`Not enough stock! Only ${found.current_qty} left.`);

        // MERGE LOGIC: Check if this part ID is already in our list
        const existingIndex = selectedItems.findIndex(item => item.id === found.id && item.type === 'Part');

        if (existingIndex > -1) {
            selectedItems[existingIndex].qty += qtyToAdd;
        } else {
            selectedItems.push({ type, name: found.item_name, price: found.price, id: found.id, qty: qtyToAdd });
        }

        found.current_qty -= qtyToAdd; 
        qtyInput.value = "1"; // Reset quantity box to 1
    }

    input.value = ''; 
    document.getElementById('alt-suggestion-box').innerHTML = ""; 
    renderDatalists(); 
    updateSummary(); 
};

window.checkAlternatives = (val) => {
    const suggestionBox = document.getElementById('alt-suggestion-box');
    
    if (!val || val.trim() === "") {
        suggestionBox.innerHTML = "";
        return;
    }

    // Clean the input name
    const typedName = val.split(/\s*\(/)[0].trim().toLowerCase();
    const currentItem = inventoryData.find(i => i.item_name.trim().toLowerCase() === typedName);

    // If we haven't found the part yet (user still typing), just wait.
    if (!currentItem) return; 

    // Find other parts with the same OEM ID, but NOT the same unique ID
    const alternatives = inventoryData.filter(i => 
        i.oem_ref_id !== null && 
        i.oem_ref_id === currentItem.oem_ref_id && 
        i.id !== currentItem.id
    );

    if (alternatives.length > 0) {
        const listItems = alternatives.map(a => 
            `<div style="margin-bottom: 4px;">
                <b style="color: #27ae60;">${a.item_name}</b> 
                <span style="color: #888;">(₱${a.price} | Stock: ${a.current_qty})</span>
            </div>`
        ).join('');
        suggestionBox.innerHTML = `<strong>💡 Alternatives found:</strong><br>${listItems}`;
    } else {
        // THIS is what you want: explicitly show there's nothing else.
        suggestionBox.innerHTML = `<span style="color: #e67e22;">ℹ️ No alternatives available for this part.</span>`;
    }
};


window.updateSummary = () => {
    const list = document.getElementById('booking-list');
    let total = 0;
    list.innerHTML = selectedItems.map((item, index) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        
        // Displays name + quantity (e.g., Oil Filter x3)
        const displayLabel = item.type === 'Part' && item.qty > 1 ? `${item.name} <b>x${item.qty}</b>` : item.name;

        return `
            <li class="summary-item">
                <span>${displayLabel}</span> 
                <span>
                    ₱${itemTotal.toLocaleString()} 
                    <button onclick="removeItem(${index})" style="background:none; color:red; border:none; cursor:pointer; margin-left:10px;">✕</button>
                </span>
            </li>`;
    }).join('');
    document.getElementById('total-price').innerText = total.toLocaleString();
};

window.removeItem = (index) => {
    const item = selectedItems[index];
    if (item.type === 'Part') {
        const found = inventoryData.find(i => i.id === item.id);
        if (found) found.current_qty += item.qty; // Return full quantity to local stock
    }
    selectedItems.splice(index, 1);
    renderDatalists();
    updateSummary();
};

window.finalizeBooking = async () => {
    if(selectedItems.length === 0) return alert("Select at least one service!");
    
    // Flatten the merged items back into individual rows for transaction_details 
    // This ensures checkout.html sees 3 items if you selected x3
    const insertData = [];
    selectedItems.forEach(item => {
        for(let i = 0; i < item.qty; i++) {
            insertData.push({
                plate_number: plate,
                item_type: item.type,
                item_name: item.name,
                price: item.price
            });
        }
    });

    const { error: transError } = await supabase.from('transaction_details').insert(insertData);
    if (transError) return alert("Error saving booking: " + transError.message);

    // Update Supabase Stock
    const partsToUpdate = selectedItems.filter(item => item.type === 'Part');
    for (const part of partsToUpdate) {
        const invItem = inventoryData.find(i => i.id === part.id);
        if (invItem) {
            await supabase.from('inventory').update({ stock_quantity: invItem.current_qty }).eq('id', part.id);
        }
    }

    window.location.href = `dashboard.html?plate=${plate}&name=${name}`;
};
    loadOptions();
</script>
</html>
