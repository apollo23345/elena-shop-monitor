<!DOCTYPE html>
<html>
<head>
    <title>Elena's Shop - Employee Login</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input, button { padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #3ecf8e; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        button:hover { background: #34b27b; }
        h2 { color: #333; text-align: center; margin-bottom: 20px; }
        .status { font-size: 0.9em; color: #d33; text-align: center; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Employee Login</h2>
        <input type="text" id="userInput" placeholder="Username (Ex: MFR1001A)">
        <input type="password" id="passInput" placeholder="Password (Ex: 1001RAMOSA)">
        <button id="loginBtn">Login</button>
        <p id="loginStatus" class="status"></p>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://yrqtnaxnshkkizradtsd.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycXRuYXhuc2hra2l6cmFkdHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODY5NTMsImV4cCI6MjA5MTM2Mjk1M30.dBveYrCJ24XIkyx6rc-iVaYkdOBGgsa-wuCV2shr1cY'
        const supabase = createClient(supabaseUrl, supabaseKey)

        document.getElementById('loginBtn').onclick = async () => {
            const uInput = document.getElementById('userInput').value.trim().toUpperCase();
            const pInput = document.getElementById('passInput').value.trim().toUpperCase();
            const status = document.getElementById('loginStatus');

            if(!uInput || !pInput) return status.innerText = "Please fill in all fields";
            status.innerText = "Verifying...";

            const { data: employees, error } = await supabase.from('employees').select('*');

            if (error) {
                status.innerText = "Connection Error: " + error.message;
                return;
            }

            let foundUser = null;

            employees.forEach(emp => {
                // Calculation: 1st letter First + 1st letter Middle + Last + ID + 1st letter Role
                const genUser = (emp.first_name[0] + emp.middle_name[0] + emp.last_name + emp.emp_id + emp.emp_role[0]).toUpperCase();
                // Calculation: ID + Last + 1st letter Role
                const genPass = (emp.emp_id + emp.last_name + emp.emp_role[0]).toUpperCase();

                if (uInput === genUser && pInput === genPass) {
                    foundUser = emp;
                }
            });

            if (foundUser) {
    status.style.color = "green";
    
    // SAVE THE USER DATA SO THE OTHER PAGES KNOW WHO IS LOGGED IN
    localStorage.setItem('currentUser', JSON.stringify(foundUser));

    if (foundUser.manager_id === null) {
        status.innerText = "Admin Login Successful! Redirecting...";
        // This is the line that actually moves the page:
        window.location.href = "admin.html"; 
    } else {
        status.innerText = "Staff Login Successful! Redirecting...";
        // This moves the staff to the New Customer page to start a job:
        window.location.href = "new-customer.html";
    }
} else {
                status.style.color = "red";
                status.innerText = "Invalid Username or Password";
            }
        };
    </script>
</body>
</html>
